version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_NOVA_LITE_ID: ${AWS_NOVA_LITE_ID:-us.amazon.nova-lite-v1:0}
    volumes:
      - ./backend/src:/app/src   # hot reload in dev

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "3000:3000"
    depends_on:
      - backend
